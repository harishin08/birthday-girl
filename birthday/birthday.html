<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.container{
    text-align:center;
    background: rgba(255,255,255,0.2);
    padding:50px 40px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease-in-out;
}

h1{
    font-size:45px;
    color:white;
    margin-bottom:20px;
}

p{
    color:white;
    font-size:18px;
    margin-bottom:30px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:white;
    color:#e5dee0;
    font-weight:500;
    transition:0.4s;
}

button:hover{
    background:#ffd700;
    color:black;
    transform: scale(1.1);
}

/* Popup */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    visibility:hidden;
    opacity:0;
    transition:0.4s;
}

.popup.active{
    visibility:visible;
    opacity:1;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    animation: scaleUp 0.5s ease;
    position:relative;
}

.popup-content img{
    width:250px;
    height:300px;
    object-fit:cover;
    border-radius:15px;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
    color:#eeeaeb;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes scaleUp{
    from{transform:scale(0.5);}
    to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday 🎉</h1>
    <p>To another year of good decisions and great memories 🫶💗</p>
    <p>Click the surprise to see something special 💖</p>
    <button onclick="openPopup()">Surprise 🎁</button>
    <img src="https://via.placeholder.com/250x300.png?text=Birthday+Girl">

</div>

<!-- Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">✖</span>
        
        <!-- Replace image below with birthday girl photo -->
        <img src="girl.jpg.jpeg" alt="Birthday Girl">
        
        <h2>Cheers to more fun, more memories and cake! Happy birthday
            senioruuuu 🫣🤩
        </h2>
    </div>
</div>

<script>
function openPopup(){
    document.getElementById("popup").classList.add("active");
}

function closePopup(){
    document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
